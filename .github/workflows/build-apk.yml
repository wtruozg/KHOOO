name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip KhoChuaPhim_Android_GitHub_Build_Project.zip -d project

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.10.2

      - name: Build APK
        working-directory: project/KhoChuaPhim_Android_GitHub_Build_Project
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KhoChuaPhim-debug-apk
          path: project/KhoChuaPhim_Android_GitHub_Build_Project/app/build/outputs/apk/debug/*.apk
